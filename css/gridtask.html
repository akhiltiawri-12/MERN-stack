<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }
        .container{
            height: 1000px;
            width: 1000px;
            display: grid;
            justify-items: stretch;
            align-items: stretch;
            gap: 10px;
            grid-template-areas: box-1 box-2 box-2 box-3 box-3;
           
        }
        .box-1{
            background-color: red;
            grid-area: box-1;

        }
        .box-2{
            background-color: yellow;
            grid-area: box-2;

        }
        .box-3{
            background-color: green;
            grid-area: box-3;
        }
        .box-4{
            background-color: blueviolet;
            grid-area: box-4;
        }
        .box-5{
            background-color: rgb(7, 7, 239);
            grid-area: box-5;
        }
        .box-6{
            background-color: coral;
            grid-area: box-6;
        }
        .box-7{
            background-color: darkseagreen;
            grid-area: box-7;
        }
        .box-8{
            background-color: aqua;
            grid-area: box-8;
        }
        .box-9{
            background-color: lightsalmon;
            grid-area: box-9;
        }
        .box{
            display: flex;
            justify-content: center;
            align-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box-1 box">box-1</div>
        <div class="box-2 box">box-2</div>
        <div class="box-3 box">box-3</div>
        <div class="box-4 box">box-4</div>
        <div class="box-5 box">box-4</div>
        <div class="box-6 box">box-6</div>
        <div class="box-7 box">box-7</div>
        <div class="box-8 box">box-8</div>
        <div class="box-9 box">box-9</div>
    </div>
</body>
</html>
