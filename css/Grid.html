
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }
        .container{
            width: 900px;
            height: 700px;
            background-color: bisque;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr   ;
            justify-items: stretch;
            align-items: stretch;
            gap: 6px;
            grid-template-areas: header herader;
        }
        .header{
            background-color: blue;
            grid-area: header;
        }
        
        .sidebar{
            background-color: deepskyblue;
            grid-area: sidebar;
        }
        .content-1{
            background-color: rgb(200, 220, 20);
            grid-area: content-1;
        }
        .content-2{
            background-color: darkgreen;
            grid-area: content-2;
        }
        .content-3{
            background-color: darkred;
            grid-area: content-3;
        }
        .foooter{
            background-color: orangered;
            grid-area: footer;

        }
        .box{
            display: flex;
            justify-content: center;
            align-content: center;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box header"> header</div>
        <div class="box sidebar">sidebar</div>
        <div class="box content-1">content-1</div>
        <div class="box content-2">content-2</div>
        <div class="box content-3">content-3</div>
        <div class="box footer"> footer</div>
    </div>
</body>
</html>
